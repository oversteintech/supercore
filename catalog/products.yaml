# AfterArtificial product registry — machine-readable source of truth.
#
# Every Super App declares:
#   name          — human-readable product name
#   package       — Flutter pubspec `name` (snake_case)
#   bundle        — Android application id / iOS bundle id
#   productLine   — consumer | enterprise
#   lifeDomain    — short Life / Industry domain label
#   reference     — true for the line's reference implementation
#   status        — shipping | scaffold | planned
#   description   — domain ownership pitch
#   siblingPath   — filesystem path used by supercore sibling checkouts

version: 3
generatedFor: after_os
organizingPrinciple: life_domains
masterVision: "2.0"
productLines:
  - consumer
  - enterprise

products:
  # ---- Consumer OS shell (not a Life Domain) ----
  - name: AfterHub
    package: after_hub
    bundle: com.overstein.afterhub
    productLine: consumer
    role: os_shell
    lifeDomain: null
    reference: false
    status: planned
    description: >
      Consumer Digital OS shell — entry product for identity, dashboard, AI,
      calendar, documents, notifications, family, search, settings, and After+.
      Super Apps contribute Hub widgets; SuperAI is the Hub AI surface (ADR-019).
    siblingPath: ../afterhub

  # ---- Consumer Life Domains ----
