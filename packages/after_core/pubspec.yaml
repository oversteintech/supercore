name: after_core
description: >
  After Core — shared Super App foundation for AfterArtificial.
  Auth, networking, storage, DI, analytics, AI, premium, and platform utilities.
version: 1.0.0
publish_to: 'none'
repository: https://github.com/oversteintech/supercore

environment:
  sdk: ^3.12.2
  flutter: '>=3.27.0'

dependencies:
  app_links: ^6.4.0
  clock: ^1.1.2
  collection: ^1.19.0
  crypto: ^3.0.7
  dio: ^5.10.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^7.2.0
  meta: ^1.16.0
  dynamic_app_icon_changer: ^0.0.3
  riverpod: any
  shared_preferences: ^2.5.5
  timezone: ^0.10.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
