name: after_enterprise
description: >
  After Enterprise — OS layer for AfterArtificial B2B / vertical Super Apps
  (SuperHospital, SuperAirport, SuperMaritime, SuperLogistics, SuperFactory, …).
  Ships shared enterprise ports + mock implementations so vertical products
  can be assembled from standards instead of new architectures.
version: 1.0.0
publish_to: 'none'
repository: https://github.com/oversteintech/supercore

environment:
  sdk: ^3.12.2
  flutter: '>=3.27.0'

dependencies:
  after_core:
    path: ../after_core
  after_design_system:
    path: ../after_design_system
  after_ecosystem:
    path: ../after_ecosystem
  clock: ^1.1.2
  collection: ^1.19.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  meta: ^1.16.0
  riverpod: any
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
