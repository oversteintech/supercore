name: after_ecosystem
description: >
  After Ecosystem Platform — unified fabric for AfterArtificial products.
  After ID, After+, event bus, cross-product APIs, shared services
  (calendar, notifications, search, wallet, family, marketplace, documents,
  analytics, settings, personalization) and ecosystem AI context.
  Consumer and enterprise modules feel like one digital OS.
version: 1.0.0
publish_to: 'none'
repository: https://github.com/oversteintech/supercore

environment:
  sdk: ^3.12.2
  flutter: '>=3.27.0'

dependencies:
  after_core:
    path: ../after_core
  clock: ^1.1.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  meta: ^1.16.0
  riverpod: any
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
