name: after_consumer
description: >
  After Consumer — OS layer for AfterArtificial B2C Super Apps
  (SuperGarage reference, plus SuperHealth, SuperFinance, SuperHome,
  SuperTravel, SuperPet, SuperSports, SuperNews, SuperGames, SuperFamily,
  SuperDocuments, SuperLearning). Thin helpers on top of after_core.
version: 1.0.0
publish_to: 'none'
repository: https://github.com/oversteintech/supercore

environment:
  sdk: ^3.12.2
  flutter: '>=3.27.0'

dependencies:
  after_core:
    path: ../after_core
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  meta: ^1.16.0
  riverpod: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
